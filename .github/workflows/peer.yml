name: Deploy Peer Site (VitePress)

on:
  push:
    branches:
      - master
    paths:
      - 'peer/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get commit info
      id: commit
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: peer/package-lock.json

    - name: Install dependencies
      working-directory: peer
      run: npm ci

    - name: Build VitePress
      working-directory: peer
      run: npm run docs:build

    - name: Add CNAME and version info
      run: |
        echo "peer.jsmsr.com" > peer/docs/.vitepress/dist/CNAME
        echo '{"commit":"${{ steps.commit.outputs.sha_short }}","built_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}' > peer/docs/.vitepress/dist/version.json

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: peer/docs/.vitepress/dist
        publish_branch: gh-pages-peer
        commit_message: 'deploy: ${{ steps.commit.outputs.sha_short }}'
